<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result</title>
  </head>
  <body>
    <form action="/predict_fwi" method="post">
      <input
        type="number"
        step="any"
        name="Temperature"
        placeholder="Temperature"
        required
      />
      <input type="number" step="any" name="RH" placeholder="RH" required />
      <input type="number" step="any" name="Ws" placeholder="Ws" required />
      <input type="number" step="any" name="Rain" placeholder="Rain" required />
      <input type="number" step="any" name="FFMC" placeholder="FFMC" required />

      <input type="number" step="any" name="DMC" placeholder="DMC" required />
      <input type="number" step="any" name="DC" placeholder="DC" required />
      <input type="number" step="any" name="ISI" placeholder="ISI" required />
      <input type="number" step="any" name="BUI" placeholder="BUI" required />
      <input
        type="number"
        step="any"
        name="Region"
        placeholder="Region"
        required
      />
      <input
        type="number"
        step="any"
        name="Classes"
        placeholder="Classes"
        required
      />

      <button type="submit">Predict</button>
    </form>

    <h2>FWI Predictions:<strong>{{prediction}}</strong></h2>
  </body>
</html>
